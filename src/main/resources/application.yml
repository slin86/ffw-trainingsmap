server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ff-trainingskarte

  # DataSource
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ff_trainingskarte}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis / Session
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Session
  session:
    store-type: redis

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info

<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <title>Anmelden</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-form { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.25rem; font-weight: bold; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #d32f2f; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #b71c1c; }
        .error { background: #ffebee; color: #c62828; padding: 0.5rem; border-radius: 4px; margin-bottom: 1rem; text-align: center; }
    </style>
</head>
<body>
    <div class="login-form">
        <h1>Anmelden</h1>
        <div th:if="${param.error}" class="error">Anmeldung fehlgeschlagen</div>
        <form th:action="@{/login}" method="post">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" required autofocus>
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Anmelden</button>
        </form>
    </div>
</body>
</html>
